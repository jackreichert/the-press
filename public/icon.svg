  <rect x="56" y="56" width="400" height="400" fill="none" stroke="#8B2500" stroke-width="2"/>
  <!-- UnifrakturMaguntia P in ivory -->
  <text x="256" y="374"
    font-family="UnifrakturMaguntia, serif"
